<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Round brand background -->
  <circle cx="50" cy="50" r="48" fill="#163832" />
  
  <!-- Centered Network Graph Icon -->
  <g transform="translate(25, 25) scale(0.8)">
    <line x1="10" y1="50" x2="30" y2="50" stroke="#ffffff" stroke-width="3" stroke-opacity="0.5" />
    <line x1="30" y1="50" x2="50" y2="30" stroke="#ffffff" stroke-width="3" stroke-opacity="0.5" />
    <line x1="50" y1="30" x2="30" y2="10" stroke="#ffffff" stroke-width="3" stroke-opacity="0.5" />
    <line x1="30" y1="10" x2="10" y2="10" stroke="#ffffff" stroke-width="3" stroke-opacity="0.5" />
    
    <circle cx="10" cy="50" r="5" fill="#ffffff" />
    <circle cx="30" cy="50" r="5" fill="#ffffff" />
    <circle cx="50" cy="30" r="5" fill="#ffffff" />
    <circle cx="30" cy="10" r="5" fill="#ffffff" />
    <circle cx="50" cy="10" r="8" fill="#F5B83D" /> <!-- Gold Accent Node -->
    <circle cx="10" cy="10" r="5" fill="#ffffff" />
  </g>
</svg>
